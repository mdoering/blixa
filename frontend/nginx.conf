# nginx for the containerized frontend: serve the SPA and reverse-proxy the API/auth paths to the
# backend on the same origin. `backend` is the docker-compose service name (see docker-compose.yml).
# The GBIF deploy uses Apache with the equivalent rules (see the deploy repo) instead of this file.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 160m;   # headroom over the backend's 150MB multipart limit

    # SPA client-side routing: any path that isn't a real file falls back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin backend: the API, the local-login/logout endpoints (under /api), the ORCID
    # initiation (/oauth2/**) and callback (/login/**), and hosted reference PDFs (/pdf/**, served
    # publicly by the backend's PdfController). Forward proto/host so Spring builds correct
    # absolute URLs (the ORCID redirect_uri) behind the proxy.
    location ~ ^/(api|login|oauth2|pdf)(/|$) {
        proxy_pass http://backend:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 300s;   # long-running imports / exports / merges
    }
}
