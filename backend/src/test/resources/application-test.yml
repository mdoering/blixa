# ORCID registration uses explicit endpoints (no issuer discovery) so the context
# loads with dummy credentials and never hits the network at startup.
spring:
  # The whole IT suite shares one Postgres container (AbstractPostgresIT). Spring caches many
  # distinct test contexts, each with its own Hikari pool; keeping their connections open exhausts
  # the container's max_connections ("FATAL: sorry, too many clients"). Let idle connections drop so
  # only the actively-running context holds any, and keep the active pool small.
  datasource:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 0
      idle-timeout: 10000
  security:
    oauth2:
      client:
        registration:
          orcid:
            client-id: test-client
            client-secret: test-secret
            scope: openid
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/orcid"
        provider:
          orcid:
            authorization-uri: https://orcid.org/oauth/authorize
            token-uri: https://orcid.org/oauth/token
            user-info-uri: https://orcid.org/oauth/userinfo
            jwk-set-uri: https://orcid.org/oauth/jwks
            user-name-attribute: sub
