spring:
  application:
    name: coldp-editor
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/blixa}
    username: ${DB_USER:blixa}
    password: ${DB_PASSWORD:blixa}
  flyway:
    enabled: true
  servlet:
    multipart:
      # Comfortably above coldp.import.max-bytes' default (100MB, see below) -- ImportRunService.start
      # does the real, configurable size gating (a clean 413 with a message); these just need to be
      # large enough that a legitimately-sized upload never hits Spring's own (otherwise 1MB/10MB
      # default) multipart resolver limit first.
      max-file-size: 150MB
      max-request-size: 150MB
  security:
    oauth2:
      client:
        registration:
          orcid:
            client-id: ${ORCID_CLIENT_ID:unconfigured}
            client-secret: ${ORCID_CLIENT_SECRET:unconfigured}
            scope: openid
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/orcid"
            client-name: ORCID
        provider:
          orcid:
            authorization-uri: https://orcid.org/oauth/authorize
            token-uri: https://orcid.org/oauth/token
            user-info-uri: https://orcid.org/oauth/userinfo
            jwk-set-uri: https://orcid.org/oauth/jwks
            user-name-attribute: sub
mybatis:
  configuration:
    map-underscore-to-camel-case: true
server:
  port: 8080
editor:
  admin:
    # Comma-separated ORCIDs that auto-become global admin + ACTIVE on login (bootstrap the first
    # admin in production). The dev-profile local login is always an admin (see DevBootstrap).
    orcids: ${EDITOR_ADMIN_ORCIDS:}

coldp:
  # AI-assisted curation. Backend-only config (keys never touch the DB or frontend). Unconfigured by
  # default -> the feature is unavailable (GET /ai/config reports available=false) and the UI hides
  # its affordance. To enable, set the default provider + the matching API key (relaxed binding, so
  # env vars work too, e.g. COLDP_AI_DEFAULT_PROVIDER=anthropic and the key below):
  #   coldp.ai.default-provider: anthropic   (anthropic | openai | google | mistral)
  ai:
    # The active provider uses its own model from `models` below; `default-model` is the fallback
    # when a provider has no entry. Each provider needs a model valid for IT (e.g. a gpt-* for OpenAI)
    # -- switching default-provider without setting that provider's model would send the fallback.
    default-model: ${AI_DEFAULT_MODEL:claude-opus-4-8}
    models:
      anthropic: ${AI_MODEL_ANTHROPIC:}
      openai: ${AI_MODEL_OPENAI:}
      google: ${AI_MODEL_GOOGLE:}
      mistral: ${AI_MODEL_MISTRAL:}
    api-keys:
      anthropic: ${ANTHROPIC_API_KEY:}
      openai: ${OPENAI_API_KEY:}
      google: ${GOOGLE_API_KEY:}
      mistral: ${MISTRAL_API_KEY:}
  # Outgoing email for discussion-follow notifications. Sending is best-effort and only happens when
  # `from` is set AND Spring's mail sender is configured (spring.mail.host); otherwise it's logged.
  mail:
    from: ${COLDP_MAIL_FROM:}
    base-url: ${COLDP_BASE_URL:http://localhost:5173}
  clb:
    base-url: https://api.checklistbank.org
  clb-import:
    # ClbImportService's gathered-usage cap (TAXON_SUBTREE/CHILDREN_ONLY): a subtree bigger than
    # this is rejected with a 400 rather than inserted, pointing the caller at the ColDP import
    # instead -- see ClbImportService.gather.
    max-usages: 500
  col:
    match-dataset: 3LXR
    gbif-checklist-key: 7ddf754f-d193-4cc9-b351-99906754a03b
  # export/import/release dirs mirror COLDP_EXPORT_DIR/COLDP_IMPORT_DIR/COLDP_RELEASE_DIR env vars
  # for deploy (like pdf.dir below) -- falling back to a tmpdir subfolder for local dev.
  export:
    dir: ${COLDP_EXPORT_DIR:${java.io.tmpdir}/coldp-exports}
    ttl: P7D
  import:
    dir: ${COLDP_IMPORT_DIR:${java.io.tmpdir}/coldp-imports}
    max-bytes: 104857600
  release:
    dir: ${COLDP_RELEASE_DIR:${java.io.tmpdir}/coldp-releases}
  pdf:
    # Reference PDF hosting (Task 2): one file per reference, written by name/PdfService and served
    # publicly (SecurityConfig permits /pdf/**) by name/PdfController. base-url is prepended to the
    # stored filename to build ReferenceResponse.pdfUrl and (when the reference has no link of its
    # own) ReferenceColdpWriter's exported `link` -- set it to an absolute URL in production so the
    # value is correct outside the app's own origin (e.g. behind Apache/Varnish); "/pdf" (relative)
    # is fine for local dev, where the SPA and API share an origin.
    dir: ${COLDP_PDF_DIR:${java.io.tmpdir}/coldp-pdfs}
    max-bytes: 33554432
    base-url: ${COLDP_PDF_BASE_URL:/pdf}
  merge:
    # pg_trgm similarity threshold for NameMatcher's POSSIBLE_FUZZY fallback (review-only, never
    # auto-merged -- see NameMatcher's @Value javadoc for the rationale). 0.7 catches single-char
    # typos (0.65-0.80 similarity on real Postgres 17 data) while staying above congeneric
    # different-species noise (<= 0.50).
    name-similarity: 0.7
    # pg_trgm similarity threshold for ReferenceMatcher's POSSIBLE fuzzy-citation fallback
    # (review-only, mirrors name-similarity's rationale above).
    citation-similarity: 0.9
    # Non-transactional apply's commit chunk size (MergeApplyService.applyNonTransactional): each
    # phase (references, name-usage Pass 1, Pass 2, matched-synonym-links, children) commits in
    # TransactionTemplate-wrapped batches of this many records rather than one commit per row.
    apply-batch: 500
