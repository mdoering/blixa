# Full stack in containers — the quick way to run everything (Postgres 17 + backend + frontend).
#
#   docker compose -f docker-compose.full.yml up --build
#   open http://localhost:8088  and sign in with  admin / admin
#
# This runs the backend under the `dev` profile, so it seeds the admin/admin login and a small sample
# project — for local/demo use only, NEVER a real deployment. The plain `docker-compose.yml` in this
# repo is different: it starts ONLY Postgres, for when you run the backend/frontend from source.
name: coldp-editor
services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: coldp_editor
      POSTGRES_USER: coldp_editor
      POSTGRES_PASSWORD: coldp_editor
    volumes:
      - coldp_editor_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coldp_editor -d coldp_editor"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev              # seeds admin/admin + a sample project (demo only)
      DB_URL: jdbc:postgresql://db:5432/coldp_editor
      DB_USER: coldp_editor
      DB_PASSWORD: coldp_editor
      SERVER_FORWARD_HEADERS_STRATEGY: framework   # honor the frontend proxy's X-Forwarded-* headers
      # ORCID is optional here — admin/admin works without it. To enable, export these before `up`.
      ORCID_CLIENT_ID: ${ORCID_CLIENT_ID:-unconfigured}
      ORCID_CLIENT_SECRET: ${ORCID_CLIENT_SECRET:-unconfigured}
    # not published: reached only through the frontend's same-origin proxy below

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8088:80"

volumes:
  coldp_editor_pg:
