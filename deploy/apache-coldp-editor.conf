# Apache vhost for the ColDP editor (GBIF dev). Serves the built SPA and reverse-proxies the
# API/auth paths to the backend on 127.0.0.1:8080, same-origin. Rename per environment:
#   dev  -> editor.dev.catalogueoflife.org
#   prod -> editor.catalogueoflife.org
# Requires mods: proxy proxy_http ssl headers  (a2enmod proxy proxy_http ssl headers).
# Install to /etc/apache2/sites-available/, then: a2ensite coldp-editor && systemctl reload apache2.

<VirtualHost *:443>
    ServerName editor.dev.catalogueoflife.org

    DocumentRoot /var/www/coldp-editor
    <Directory /var/www/coldp-editor>
        Require all granted
        # SPA history-mode routing: any path that isn't a real file falls back to index.html.
        FallbackResource /index.html
    </Directory>

    # Same-origin backend. Proxy rules win over DocumentRoot, so /api, /login (ORCID callback +
    # local login/logout live under /api), and /oauth2 (ORCID initiation) go to the app; everything
    # else is the static SPA.
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    ProxyPass        /api    http://127.0.0.1:8080/api
    ProxyPassReverse /api    http://127.0.0.1:8080/api
    ProxyPass        /login  http://127.0.0.1:8080/login
    ProxyPassReverse /login  http://127.0.0.1:8080/login
    ProxyPass        /oauth2 http://127.0.0.1:8080/oauth2
    ProxyPassReverse /oauth2 http://127.0.0.1:8080/oauth2

    # Allow large ColDP import uploads through the proxy (backend caps at 100MB via coldp.import.max-bytes).
    LimitRequestBody 167772160

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/editor.dev.catalogueoflife.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/editor.dev.catalogueoflife.org/privkey.pem

    ErrorLog  ${APACHE_LOG_DIR}/coldp-editor_error.log
    CustomLog ${APACHE_LOG_DIR}/coldp-editor_access.log combined
</VirtualHost>
