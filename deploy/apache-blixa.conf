# Apache vhost for Blixa (GBIF dev). Serves the built SPA and reverse-proxies the
# API/auth paths to the backend on 127.0.0.1:8111, same-origin. Rename per environment:
#   dev  -> blixa.dev.catalogueoflife.org
#   prod -> blixa.catalogueoflife.org
# Requires mods: proxy proxy_http ssl headers  (a2enmod proxy proxy_http ssl headers).
# Install to /etc/apache2/sites-available/, then: a2ensite blixa && systemctl reload apache2.

<VirtualHost *:80>
    ServerName blixa.dev.catalogueoflife.org
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName blixa.dev.catalogueoflife.org

    DocumentRoot /var/www/html/blixa
    <Directory /var/www/html/blixa>
        Require all granted
        # SPA history-mode routing: any path that isn't a real file falls back to index.html.
        FallbackResource /index.html
    </Directory>

    # Reference PDFs: uploaded via the editor, stored on disk (COLDP_PDF_DIR -> coldp.pdf.dir), served
    # read-only here. The /pdf/<file> URL is what goes into Reference.link (binaries are never in
    # ColDP). Static files (no proxy, no SPA fallback); no directory listing. Point the Alias at the
    # same dir as COLDP_PDF_DIR in the env.
    Alias /pdf /mnt/auto/col/blixa/pdfs
    <Directory /mnt/auto/col/blixa/pdfs>
        Require all granted
        Options -Indexes
    </Directory>

    # Same-origin backend. Proxy rules win over DocumentRoot, so /api, /login (ORCID callback +
    # local login/logout live under /api), and /oauth2 (ORCID initiation) go to the app; everything
    # else is the static SPA.
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    ProxyPass        /api    http://127.0.0.1:8111/api
    ProxyPassReverse /api    http://127.0.0.1:8111/api
    ProxyPass        /login  http://127.0.0.1:8111/login
    ProxyPassReverse /login  http://127.0.0.1:8111/login
    ProxyPass        /oauth2 http://127.0.0.1:8111/oauth2
    ProxyPassReverse /oauth2 http://127.0.0.1:8111/oauth2

    # Allow large ColDP import uploads through the proxy (backend caps at 100MB via coldp.import.max-bytes).
    LimitRequestBody 167772160

    SSLEngine on
    # TLS: the GBIF Apache serves a wildcard *.dev.catalogueoflife.org cert globally; add
    # SSLCertificateFile/KeyFile here if your host doesn't.

    ErrorLog  ${APACHE_LOG_DIR}/blixa_error.log
    CustomLog ${APACHE_LOG_DIR}/blixa_access.log combined
</VirtualHost>
